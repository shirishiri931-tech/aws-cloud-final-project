# .docsync/manifest.yml — page -> source anchors (seeded by `docsync bootstrap`)
# Validate with: docsync doctor --docs-repo .
# reference pages use precise anchors (autopass); concept/guide pages use broad
# anchors with judge_required: true.

pages:
  - path: docs/specification/overview.mdx
    kind: concept
    judge_required: true
    sources:
      - repo: ""               # single-repo: empty repo == wildcard
        globs: ["README.md", "backend/functions/**", "frontend/src/**"]

  - path: docs/specification/business-idea.mdx
    kind: concept
    judge_required: true
    sources:
      - repo: ""
        globs: ["README.md"]

  - path: docs/specification/use-cases.mdx
    kind: guide
    judge_required: true
    sources:
      - repo: ""
        globs:
          - "frontend/src/App.jsx"
          - "frontend/src/lib/**"
          - "frontend/src/hooks/**"
          - "frontend/src/components/**"
          - "backend/functions/**/lambda_function.py"
        symbols:
          # frontend symbols relocated in the production-grade rebuild
          - "lambda_handler"
          - "createDocument"   # lib/api.js + useDocuments.js (createDoc)
          - "uploadVersion"    # was uploadFile -> useDocuments.js / api.js
          - "updateStatus"     # was changeStatus -> useDocuments.js / api.js
          - "getDownloadUrl"   # was downloadFile -> lib/api.js
          - "createUser"       # lib/api.js + components/admin/AddUserModal.jsx

  - path: docs/specification/prompts.mdx
    kind: concept
    judge_required: true
    sources:
      - repo: ""
        globs: ["README.md", "backend/functions/**", "frontend/src/**"]

  - path: docs/specification/architecture.mdx
    kind: reference
    judge_required: false
    sources:
      - repo: ""
        globs: ["backend/functions/**/lambda_function.py"]
        symbols: ["lambda_handler"]

  - path: docs/specification/api-reference.mdx
    kind: reference
    judge_required: false
    sources:
      - repo: ""
        globs: ["backend/functions/**/lambda_function.py"]
        symbols: ["lambda_handler"]

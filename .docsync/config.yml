# .docsync/config.yml — generated by `docsync init --minimal --detect`
# Inspect every field with `docsync explain`.

adapter: mintlify            # docs site format (docs.json nav + .mdx pages)
docs_root: docs              # where authored pages live, relative to the docs repo
repo_mode: single            # code + docs in one repo (DocumentFlow Cloud)
forge: github                # origin is github.com/shirishiri931-tech/aws-cloud-final-project

max_pages_per_run: 12

models:
  edit_model: claude-opus-4-8      # authoring / surgical edits
  judge_model: claude-haiku-4-5    # relevance judging / critique / infer

thresholds:
  max_diff_lines: 80               # per-anchor edit-size gate
  judge_min_score: 0.62

embeddings:
  enabled: false                   # recall-net off for this small single-repo site
